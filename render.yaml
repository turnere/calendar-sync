services:
  - type: web
    name: calendar-sync
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /data
      - key: BASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID_1
        sync: false
      - key: GOOGLE_CLIENT_SECRET_1
        sync: false
      - key: GOOGLE_CLIENT_ID_2
        sync: false
      - key: GOOGLE_CLIENT_SECRET_2
        sync: false
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
