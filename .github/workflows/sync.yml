name: Calendar Sync

on:
  schedule:
    # Runs every 15 minutes. Adjust as needed.
    # Note: GitHub Actions cron can be delayed during high-traffic periods.
    # Free-tier private repos get 2,000 minutes/month (~1,440 used at 15-min intervals).
    # For public repos, minutes are unlimited.
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allow manual trigger from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --ignore-scripts && npm rebuild better-sqlite3

      - name: Restore sync database
        uses: actions/cache/restore@v4
        with:
          path: data
          key: sync-db-${{ github.run_id }}
          restore-keys: sync-db-

      - name: Run sync
        env:
          GOOGLE_CLIENT_ID_1: ${{ secrets.GOOGLE_CLIENT_ID_1 }}
          GOOGLE_CLIENT_SECRET_1: ${{ secrets.GOOGLE_CLIENT_SECRET_1 }}
          GOOGLE_CLIENT_ID_2: ${{ secrets.GOOGLE_CLIENT_ID_2 }}
          GOOGLE_CLIENT_SECRET_2: ${{ secrets.GOOGLE_CLIENT_SECRET_2 }}
          ACCOUNT1_TOKENS: ${{ secrets.ACCOUNT1_TOKENS }}
          ACCOUNT1_EMAIL: ${{ secrets.ACCOUNT1_EMAIL }}
          ACCOUNT2_TOKENS: ${{ secrets.ACCOUNT2_TOKENS }}
          ACCOUNT2_EMAIL: ${{ secrets.ACCOUNT2_EMAIL }}
          CALENDAR_ID_1: ${{ secrets.CALENDAR_ID_1 }}
          CALENDAR_ID_2: ${{ secrets.CALENDAR_ID_2 }}
          CALENDAR_NAME_1: ${{ secrets.CALENDAR_NAME_1 }}
          CALENDAR_NAME_2: ${{ secrets.CALENDAR_NAME_2 }}
          PREFIX_1: ${{ secrets.PREFIX_1 }}
          PREFIX_2: ${{ secrets.PREFIX_2 }}
        run: node src/sync-runner.js

      - name: Save sync database
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data
          key: sync-db-${{ github.run_id }}
